<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PNC Login</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="css/style.css"></head><body class="login-page"><section class="login-box"><h1>PNC Login</h1><p>PNC campaign dashboard only</p><form id="f"><div class="field"><input id="u" value="pnc2026" placeholder="Username" required></div><div class="field"><input id="p" type="password" placeholder="Password" required></div><div id="m" class="msg"></div><button class="btn pnc" style="width:100%" id="b">Login</button><p><a style="color:#fff" href="index.html">Home</a></p></form></section><script src="js/config.js"></script><script src="js/auth.js"></script><script>f.onsubmit=async e=>{e.preventDefault();b.disabled=true;b.textContent='Checking...';const r=await loginWithUsername(u.value,p.value);if(r.error){m.className='msg error';m.textContent=r.error;b.disabled=false;b.textContent='Login';return}const role=await getActiveRole();if(!role||role.party!=='PNC'){await createSupabaseClient().auth.signOut();m.className='msg error';m.textContent='PNC only';b.disabled=false;b.textContent='Login';return}location.href='all-voters.html?party=PNC'};</script></body></html>

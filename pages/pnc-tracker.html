<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNC Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css?v=51" />
    <style>
        :root { --party-color: #1abc9c; --btn-text: #ffffff; }
        .tracker-entry { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .entry-box { width: min(460px, 100%); background: #fffdf8; border: 1px solid #d9cdbb; border-radius: 14px; box-shadow: 0 12px 28px rgba(23,32,51,.08); padding: 28px; text-align: center; }
        .entry-box i { color: var(--party-color); font-size: 38px; margin-bottom: 12px; }
        .entry-box h1 { font-size: 24px; margin-bottom: 8px; }
        .entry-box p { color: #6b7280; margin-bottom: 18px; }
        .entry-actions { display: grid; gap: 10px; }
        .entry-actions a, .entry-actions button { border: 0; border-radius: 10px; padding: 12px 14px; font-weight: 800; text-decoration: none; cursor: pointer; }
        .primary-link { background: var(--party-color); color: #062f2a; }
        .secondary-link { background: #f3ecdf; color: #172033; }
    </style>
</head>
<body>
    <main class="tracker-entry">
        <section class="entry-box">
            <i class="fas fa-users"></i>
            <h1>PNC Tracker</h1>
            <p>Use the protected All Voters dashboard and filter PNC.</p>
            <div class="entry-actions">
                <a class="primary-link" href="../all-voters.html?party=PNC">Open PNC Voters</a>
                <a class="secondary-link" href="../index.html">Back Home</a>
                <button class="secondary-link" type="button" onclick="signOut()">Sign Out</button>
            </div>
        </section>
    </main>
    <script>window.TEST_MODE_NO_LOGIN = false;</script>
    <script src="../js/config.js?v=51"></script>
    <script src="../js/components.js?v=51"></script>
    <script src="../js/auth.js?v=51"></script>
    <script>
        requireAccess({ roles: ['admin'], loginPath: '../login.html' });
    </script>
</body>
</html>

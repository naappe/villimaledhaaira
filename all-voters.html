<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Campaign Dashboard</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="css/style.css"></head><body><div class="topbar"><div class="wrap" style="display:flex;justify-content:space-between;align-items:center"><strong id="title">Campaign Dashboard</strong><div><a class="btn muted" href="index.html">Home</a><button class="btn muted" onclick="signOut()">Sign Out</button></div></div></div><main class="wrap"><section class="stats"><div class="stat"><strong id="total">0</strong><span id="totalLabel">Voters</span></div><div class="stat"><strong id="reached">0</strong><span>Reached</span></div><div class="stat"><strong id="will">0</strong><span>Will Vote</span></div><div class="stat"><strong id="pending">0</strong><span>Pending</span></div></section><section class="filters"><input id="search" placeholder="Search name, ID, house, phone"><select id="party"><option value="">All Parties</option><option>MDP</option><option>PNC</option></select><select id="reach"><option value="">All Reach</option><option value="reached">Reached</option><option value="not-reached">Not Reached</option></select><select id="vote"><option value="">All Vote</option><option value="will-vote">Will Vote</option><option value="pending">Pending</option><option value="not-decided">Not Decided</option><option value="no-vote">No Vote</option></select><button class="btn muted" onclick="resetFilters()">Reset</button></section><section class="cards" id="cards"></section></main><div class="modal" id="modal"><div class="modal-box"><button class="close" onclick="closeModal()">×</button><h2 id="mn"></h2><p id="mid"></p><form id="editForm"><div class="field"><label>Phone</label><input id="mphone"></div><div class="field"><label>Reach Status</label><select id="mreach"><option value="not-reached">Not Reached</option><option value="reached">Reached</option></select></div><div class="field"><label>Vote Status</label><select id="mvote"><option value="pending">Pending</option><option value="will-vote">Will Vote</option><option value="not-decided">Not Decided</option><option value="no-vote">No Vote</option></select></div><div class="field"><label>Remarks</label><textarea id="mremarks"></textarea></div><button class="btn primary" style="width:100%">Save</button></form></div></div><script src="js/config.js"></script><script src="js/auth.js"></script><script src="js/dashboard.js"></script></body></html>

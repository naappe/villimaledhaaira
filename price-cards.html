<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Price Comparison</title><style>:root{--bg:#181818;--p:#262626;--l:#444;--t:#fff;--m:#aaa;--g:#34d399;--r:#f87171;--y:#fbbf24}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--bg);color:var(--t)}header{display:flex;justify-content:space-between;padding:15px 20px;background:#222;border-bottom:1px solid var(--l)}a{color:#fff;text-decoration:none;background:#444;padding:10px 14px;border-radius:8px}main{max-width:1500px;margin:auto;padding:20px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}input,select{height:42px;background:#171717;color:#fff;border:1px solid var(--l);border-radius:8px;padding:0 12px}input{flex:1;min-width:250px}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:15px}.card{background:var(--p);border:1px solid var(--l);border-radius:14px;overflow:hidden}.head{padding:15px;border-bottom:1px solid var(--l)}h2{margin:0 0 8px;font-size:18px}.meta{color:var(--m);font-size:13px}.rates{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--l)}.rate{background:var(--p);padding:18px 14px}.rate small{display:block;color:var(--m);margin-bottom:8px}.rate strong{font-size:22px;color:var(--g)}.cmp{padding:13px 15px;border-top:1px solid var(--l);font-size:13px}.good{color:var(--g)}.bad{color:var(--r)}.same{color:var(--y)}.none{color:var(--m)}.empty{color:var(--m);padding:40px;text-align:center}@media(max-width:520px){main{padding:12px}}</style></head><body><header><strong>Price Comparison</strong><a href="./">← Finance</a></header><main><div class="toolbar"><input id="search" placeholder="Search item or vendor"><select id="type"><option value="all">All types</option><option value="weight">KG/G</option><option value="liquid">L/ML</option><option value="pieces">Pieces</option></select><span id="count"></span></div><div class="cards" id="cards"></div></main><script>(()=>{'use strict';const K='whiteSaffronMultiBillsV3',$=id=>document.getElementById(id),money=n=>'MVR '+Number(n||0).toFixed(4).replace(/0+$/,'').replace(/\.$/,'');const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));let bills=[];try{bills=JSON.parse(localStorage.getItem(K)||'[]')}catch(e){}function pack(v){const m=String(v||'').trim().toLowerCase().match(/^(\d+(?:\.\d+)?)\s*[x×*]\s*(\d+(?:\.\d+)?)\s*(kg|g|l|ml|pcs|pc)$/);return m?{s:+m[1],c:+m[2],u:m[3]}:null}function norm(b,i){const p=pack(i.pack),q=+i.qty||0,r=+i.rate||0;if(!p||!q||!r)return null;const n=q*p.c;if(p.u==='g'||p.u==='kg'){const g=n*p.s*(p.u==='kg'?1000:1);return{kind:'weight',b,i,a:r/(g/1000),z:r/g,A:'KG',Z:'G'}}if(p.u==='ml'||p.u==='l'){const ml=n*p.s*(p.u==='l'?1000:1);return{kind:'liquid',b,i,a:r/(ml/1000),z:r/ml,A:'L',Z:'ML'}}const pcs=n*p.s;return{kind:'pieces',b,i,a:r/pcs,z:r/pcs,A:'PCS',Z:'PCS'}}function all(){return bills.flatMap(b=>(b.items||[]).map(i=>norm(b,i)).filter(Boolean)).sort((x,y)=>(y.b.date||'').localeCompare(x.b.date||''))}function key(x){return String(x.i.desc||'').trim().toLowerCase()+'|'+x.kind}function cmp(x,s){const p=s.filter(y=>y!==x&&key(y)===key(x)&&String(y.b.vendor||'').toLowerCase()!==String(x.b.vendor||'').toLowerCase());if(!p.length)return{c:'none',t:'No other vendor price'};const best=p.reduce((a,b)=>b.a<a.a?b:a),d=x.a-best.a,pc=best.a?Math.abs(d/best.a*100):0;if(Math.abs(d)<1e-8)return{c:'same',t:'Same price as '+esc(best.b.vendor)};return d<0?{c:'good',t:pc.toFixed(1)+'% cheaper than '+esc(best.b.vendor)}:{c:'bad',t:pc.toFixed(1)+'% more expensive than '+esc(best.b.vendor)}}function render(){const s=all(),q=$('search').value.toLowerCase(),t=$('type').value,l=s.filter(x=>(t==='all'||x.kind===t)&&(!q||((x.i.desc||'')+' '+(x.b.vendor||'')).toLowerCase().includes(q)));$('count').textContent=l.length+' cards';$('cards').innerHTML=l.map(x=>{const c=cmp(x,s);return`<article class="card"><div class="head"><h2>${esc(x.i.desc)}</h2><div class="meta">${esc(x.b.vendor)} · ${esc(x.b.date)}</div></div><div class="rates"><div class="rate"><small>Price per 1 ${x.A}</small><strong>${money(x.a)}</strong></div><div class="rate"><small>Price per 1 ${x.Z}</small><strong>${money(x.z)}</strong></div></div><div class="cmp ${c.c}">${c.t}</div></article>`}).join('')||'<div class="empty">No saved prices found.</div>'}$('search').oninput=render;$('type').onchange=render;render()})();</script></body></html>

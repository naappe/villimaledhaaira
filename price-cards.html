<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Price Cards · White Saffron Finance</title>
<style>
:root{--accent:#d97706;--bg:#181818;--panel:#262626;--line:#444;--text:#fff;--muted:#aaa;--good:#34d399}
*{box-sizing:border-box}
html,body{direction:ltr}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 20px;background:#222;border-bottom:1px solid var(--line)}
header strong{font-size:18px}
a{color:#fff;text-decoration:none}.back{background:#444;border-radius:8px;padding:10px 14px;font-weight:700}
main{max-width:1500px;margin:auto;padding:20px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
input,select{height:42px;border:1px solid var(--line);border-radius:8px;background:#171717;color:#fff;padding:0 12px;direction:ltr;text-align:left;font:inherit}
input{min-width:260px;flex:1}.count{color:var(--muted);align-self:center}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:15px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.card-head{padding:15px;border-bottom:1px solid var(--line)}
.card-head h2{font-size:18px;margin:0 0 6px}.meta{color:var(--muted);font-size:12px;line-height:1.5}
.rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.rate{background:var(--panel);padding:14px;min-height:84px}.rate small{display:block;color:var(--muted);margin-bottom:7px}.rate strong{display:block;font-size:19px;word-break:break-word}.highlight strong{color:var(--good)}
.bill{padding:12px 15px;color:var(--muted);font-size:12px;border-top:1px solid var(--line)}
.empty{padding:40px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px}
@media(max-width:520px){main{padding:12px}header{padding:12px}.cards{grid-template-columns:1fr}.rate strong{font-size:17px}}
</style>
</head>
<body>
<header><strong>Price Cards</strong><a class="back" href="./">← Finance</a></header>
<main>
<div class="toolbar">
<input id="search" placeholder="Search item or vendor">
<select id="type"><option value="all">All types</option><option value="weight">Weight · KG/G</option><option value="liquid">Liquid · L/ML</option><option value="pieces">Pieces</option></select>
<span class="count" id="count"></span>
</div>
<div class="cards" id="cards"></div>
</main>
<script>
(()=>{
'use strict';
const KEY='whiteSaffronMultiBillsV3';
const $=id=>document.getElementById(id);
const money=n=>'MVR '+Number(n||0).toFixed(4).replace(/0+$/,'').replace(/\.$/,'');
const num=n=>Number(n||0).toLocaleString(undefined,{maximumFractionDigits:3});
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
let bills=[];try{bills=JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){}
function parsePack(raw){const m=String(raw||'').trim().toLowerCase().match(/^(\d+(?:\.\d+)?)\s*[x×*]\s*(\d+(?:\.\d+)?)\s*(kg|g|l|ml|pcs|pc)$/i);return m?{size:+m[1],count:+m[2],measure:m[3].toLowerCase()}:null}
function normalize(b,item){
 const p=parsePack(item.pack),qty=+item.qty||0,rate=+item.rate||0;
 if(!p||!qty||!rate)return null;
 const units=qty*p.count;
 if(p.measure==='g'||p.measure==='kg'){
  const grams=units*p.size*(p.measure==='kg'?1000:1),kg=grams/1000;
  return{kind:'weight',b,item,totalMajor:kg,totalMinor:grams,majorLabel:'KG',minorLabel:'G',majorRate:rate/kg,minorRate:rate/grams,packRate:rate/units,lineTotal:qty*rate};
 }
 if(p.measure==='ml'||p.measure==='l'){
  const ml=units*p.size*(p.measure==='l'?1000:1),litres=ml/1000;
  return{kind:'liquid',b,item,totalMajor:litres,totalMinor:ml,majorLabel:'L',minorLabel:'ML',majorRate:rate/litres,minorRate:rate/ml,packRate:rate/units,lineTotal:qty*rate};
 }
 const pcs=units*p.size;
 return{kind:'pieces',b,item,totalMajor:pcs,totalMinor:pcs,majorLabel:'PCS',minorLabel:'PCS',majorRate:rate/pcs,minorRate:rate/pcs,packRate:rate/units,lineTotal:qty*rate};
}
function all(){return bills.slice().reverse().flatMap(b=>(b.items||[]).map(item=>normalize(b,item)).filter(Boolean))}
function render(){
 const q=$('search').value.trim().toLowerCase(),type=$('type').value;
 const list=all().filter(x=>(type==='all'||x.kind===type)&&(!q||((x.item.desc||'')+' '+(x.b.vendor||'')+' '+(x.item.pack||'')).toLowerCase().includes(q)));
 $('count').textContent=list.length+' saved item'+(list.length===1?'':'s');
 $('cards').innerHTML=list.map(x=>`<article class="card">
  <div class="card-head"><h2>${esc(x.item.desc)}</h2><div class="meta">${esc(x.b.vendor)} · ${esc(x.b.date)}<br>Pack: ${esc(x.item.pack)} · Qty: ${num(x.item.qty)} · Bill rate: ${money(x.item.rate)}</div></div>
  <div class="rate-grid">
   <div class="rate"><small>Total ${x.majorLabel}</small><strong>${num(x.totalMajor)} ${x.majorLabel}</strong></div>
   <div class="rate"><small>Total ${x.minorLabel}</small><strong>${num(x.totalMinor)} ${x.minorLabel}</strong></div>
   <div class="rate highlight"><small>Price per 1 ${x.majorLabel}</small><strong>${money(x.majorRate)}</strong></div>
   <div class="rate highlight"><small>Price per 1 ${x.minorLabel}</small><strong>${money(x.minorRate)}</strong></div>
   <div class="rate"><small>Price per pack</small><strong>${money(x.packRate)}</strong></div>
   <div class="rate"><small>Line total</small><strong>${money(x.lineTotal)}</strong></div>
  </div>
  <div class="bill">Saved from bill · ${esc(x.b.status||'')} · ${esc(x.b.payment||'')}</div>
 </article>`).join('')||'<div class="empty">No saved bill items found in this browser. Save a bill first, then return to this page.</div>';
}
$('search').addEventListener('input',render);$('type').addEventListener('change',render);render();
})();
</script>
</body>
</html>

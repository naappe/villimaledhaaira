<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Villimale Dhaaira - Voter Search</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: #F5F3FF;
            color: #1E293B;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid #E2E8F0;
        }

        .header .brand {
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1E293B;
        }

        .header .brand i {
            color: #7C3AED;
            font-size: 22px;
        }

        .header .brand span {
            font-size: 13px;
            color: #94A3B8;
            font-weight: 400;
        }

        .search-box {
            width: 100%;
            max-width: 800px;
            position: relative;
            margin-bottom: 12px;
        }

        .search-box input {
            width: 100%;
            height: 56px;
            padding: 0 48px 0 48px;
            border: 2px solid #E2E8F0;
            border-radius: 14px;
            font-size: 16px;
            background: white;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .search-box input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .search-box input::placeholder {
            color: #94A3B8;
        }

        .search-box .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 18px;
        }

        .search-box .clear {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
            font-size: 20px;
            display: none;
            padding: 4px;
        }

        .search-box .clear.show {
            display: block;
        }

        .search-box .clear:hover {
            color: #1E293B;
        }

        /* TOOLBAR */
        .toolbar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 4px 12px 4px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stats {
            font-size: 13px;
            color: #94A3B8;
        }

        .stats strong {
            color: #1E293B;
            font-weight: 600;
        }

        .toolbar .hint {
            font-size: 12px;
            color: #94A3B8;
        }

        .toolbar .hint kbd {
            background: #F1F5F9;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #E2E8F0;
            font-size: 11px;
            font-family: inherit;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: #F1F5F9;
            padding: 4px;
            border-radius: 8px;
        }

        .view-toggle button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #94A3B8;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .view-toggle button:hover {
            color: #1E293B;
        }

        .view-toggle button.active {
            background: white;
            color: #7C3AED;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* LIST VIEW */
        .results-list {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-item {
            background: white;
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        .result-item:hover {
            border-color: #7C3AED;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.08);
            transform: translateY(-1px);
        }

        .result-item .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #EDE9FE;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #7C3AED;
            flex-shrink: 0;
            border: 2px solid #E2E8F0;
            overflow: hidden;
        }

        .result-item .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .result-item .avatar .no-photo {
            font-size: 20px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .result-item .info {
            flex: 1;
            min-width: 0;
        }

        .result-item .name {
            font-weight: 600;
            font-size: 15px;
            color: #1E293B;
        }

        .result-item .detail {
            font-size: 13px;
            color: #64748B;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 14px;
            margin-top: 2px;
        }

        .result-item .detail i {
            width: 14px;
            color: #7C3AED;
            font-size: 12px;
            margin-right: 2px;
        }

        .result-item .detail .sep {
            color: #E2E8F0;
        }

        .result-item .detail .badge {
            background: #F1F5F9;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            color: #64748B;
        }

        /* GRID VIEW */
        .results-grid {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            overflow: hidden;
            transition: 0.2s;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        .result-card:hover {
            border-color: #7C3AED;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.12);
            transform: translateY(-3px);
        }

        .result-card .card-photo {
            width: 100%;
            height: 160px;
            background: #EDE9FE;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .result-card .card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-card .card-photo .no-photo {
            font-size: 48px;
            font-weight: 700;
            color: #7C3AED;
            text-transform: uppercase;
        }

        .result-card .card-body {
            padding: 12px 14px 14px;
        }

        .result-card .card-name {
            font-weight: 600;
            font-size: 14px;
            color: #1E293B;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-card .card-detail {
            font-size: 12px;
            color: #64748B;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .result-card .card-detail i {
            width: 12px;
            color: #7C3AED;
            margin-right: 2px;
        }

        .result-card .card-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .result-card .card-badges .badge {
            background: #F1F5F9;
            padding: 1px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
            color: #64748B;
        }

        .result-card .card-id {
            font-size: 10px;
            color: #94A3B8;
            margin-top: 4px;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal .modal-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .modal .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #94A3B8;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .modal .modal-header .close-btn:hover {
            background: #F1F5F9;
            color: #1E293B;
        }

        .modal .modal-photo {
            padding: 20px;
            text-align: center;
            background: #F5F3FF;
        }

        .modal .modal-photo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .modal .modal-photo .no-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #EDE9FE;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: #7C3AED;
            text-transform: uppercase;
            margin: 0 auto;
            border: 4px solid white;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .modal .modal-info {
            padding: 16px 20px 20px;
        }

        .modal .modal-info .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #F1F5F9;
        }

        .modal .modal-info .row:last-child {
            border-bottom: none;
        }

        .modal .modal-info .label {
            color: #94A3B8;
            font-size: 13px;
        }

        .modal .modal-info .value {
            font-weight: 500;
            font-size: 13px;
            color: #1E293B;
            text-align: right;
        }

        .modal .modal-actions {
            padding: 12px 20px 20px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #E2E8F0;
        }

        .modal .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal .modal-actions .btn-copy {
            background: #7C3AED;
            color: white;
        }

        .modal .modal-actions .btn-copy:hover {
            background: #6D28D9;
            transform: translateY(-1px);
        }

        .modal .modal-actions .btn-close-modal {
            background: #F1F5F9;
            color: #64748B;
        }

        .modal .modal-actions .btn-close-modal:hover {
            background: #E2E8F0;
        }

        /* EMPTY STATE */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #94A3B8;
            background: white;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            width: 100%;
            max-width: 800px;
        }

        .empty i {
            font-size: 48px;
            color: #E2E8F0;
            display: block;
            margin-bottom: 16px;
        }

        .empty h3 {
            font-size: 18px;
            color: #1E293B;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .empty p {
            font-size: 14px;
            color: #94A3B8;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #94A3B8;
            width: 100%;
            max-width: 800px;
        }

        .loading i {
            font-size: 28px;
            animation: spin 1s linear infinite;
            color: #7C3AED;
            display: block;
            margin-bottom: 12px;
        }

        @keyframes spin {
            from { transform: rotate(0); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .highlight {
            background: #EDE9FE;
            color: #6D28D9;
            padding: 0 3px;
            border-radius: 3px;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E1B4B;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 92%;
            text-align: center;
            animation: slideUpToast 0.3s ease;
            border-left: 4px solid #7C3AED;
        }

        .toast.success { border-left-color: #22C55E; }
        .toast.error { border-left-color: #EF4444; }

        @keyframes slideUpToast {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .header .brand { font-size: 16px; }
            .header .brand span { display: none; }
            .search-box input { height: 48px; font-size: 14px; padding: 0 40px 0 40px; }
            .search-box .icon { font-size: 15px; left: 14px; }
            .search-box .clear { font-size: 17px; right: 14px; }
            .toolbar { flex-direction: column; align-items: stretch; gap: 8px; }
            .toolbar .hint { display: none; }
            .stats { font-size: 12px; }
            .result-item { padding: 12px 14px; flex-wrap: wrap; gap: 10px; }
            .result-item .avatar { width: 40px; height: 40px; font-size: 15px; }
            .result-item .name { font-size: 14px; }
            .result-item .detail { font-size: 12px; gap: 2px 10px; }
            .results-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
            .result-card .card-photo { height: 120px; }
            .result-card .card-photo .no-photo { font-size: 36px; }
            .result-card .card-body { padding: 10px 12px 12px; }
            .result-card .card-name { font-size: 13px; }
            .modal { max-width: 100%; margin: 10px; }
            .modal .modal-photo img { width: 80px; height: 80px; }
            .modal .modal-photo .no-photo { width: 80px; height: 80px; font-size: 32px; }
            .modal .modal-info .row { padding: 6px 0; font-size: 13px; }
            .modal .modal-actions { flex-direction: column; }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .results-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }

        /* DARK MODE */
        @media (prefers-color-scheme: dark) {
            body { background: #0F0A1A; color: #F1F5F9; }
            .header { border-bottom-color: #2D3A4F; }
            .header .brand { color: #F1F5F9; }
            .header .brand span { color: #64748B; }
            .search-box input { background: #1A1430; color: #F1F5F9; border-color: #2D3A4F; }
            .search-box input:focus { border-color: #7C3AED; }
            .search-box input::placeholder { color: #64748B; }
            .search-box .icon { color: #64748B; }
            .search-box .clear { color: #64748B; }
            .search-box .clear:hover { color: #F1F5F9; }
            .stats { color: #64748B; }
            .stats strong { color: #F1F5F9; }
            .toolbar .hint kbd { background: #1A1430; border-color: #2D3A4F; color: #94A3B8; }
            .view-toggle { background: #1A1430; }
            .view-toggle button { color: #64748B; }
            .view-toggle button:hover { color: #F1F5F9; }
            .view-toggle button.active { background: #2D3A4F; color: #A78BFA; }
            .result-item { background: #1A1430; border-color: #2D3A4F; }
            .result-item:hover { border-color: #7C3AED; }
            .result-item .avatar { background: rgba(124, 58, 237, 0.2); border-color: #2D3A4F; color: #A78BFA; }
            .result-item .name { color: #F1F5F9; }
            .result-item .detail { color: #94A3B8; }
            .result-item .detail i { color: #A78BFA; }
            .result-item .detail .sep { color: #2D3A4F; }
            .result-item .detail .badge { background: #0F0A1A; color: #94A3B8; }
            .result-card { background: #1A1430; border-color: #2D3A4F; }
            .result-card:hover { border-color: #7C3AED; }
            .result-card .card-photo { background: rgba(124, 58, 237, 0.2); }
            .result-card .card-photo .no-photo { color: #A78BFA; }
            .result-card .card-name { color: #F1F5F9; }
            .result-card .card-detail { color: #94A3B8; }
            .result-card .card-badges .badge { background: #0F0A1A; color: #94A3B8; }
            .result-card .card-id { color: #64748B; }
            .empty { background: #1A1430; border-color: #2D3A4F; color: #64748B; }
            .empty i { color: #2D3A4F; }
            .empty h3 { color: #F1F5F9; }
            .empty p { color: #64748B; }
            .modal { background: #1A1430; }
            .modal .modal-header { border-bottom-color: #2D3A4F; }
            .modal .modal-header h2 { color: #F1F5F9; }
            .modal .modal-header .close-btn { color: #64748B; }
            .modal .modal-header .close-btn:hover { background: #0F0A1A; color: #F1F5F9; }
            .modal .modal-photo { background: #0F0A1A; }
            .modal .modal-photo .no-photo { background: rgba(124, 58, 237, 0.2); color: #A78BFA; }
            .modal .modal-info .row { border-bottom-color: #0F0A1A; }
            .modal .modal-info .label { color: #64748B; }
            .modal .modal-info .value { color: #F1F5F9; }
            .modal .modal-actions { border-top-color: #2D3A4F; }
            .modal .modal-actions .btn-close-modal { background: #0F0A1A; color: #94A3B8; }
            .modal .modal-actions .btn-close-modal:hover { background: #2D3A4F; }
            .toast { background: #1A1430; color: #F1F5F9; border-left-color: #7C3AED; }
            .toast.success { border-left-color: #22C55E; }
            .toast.error { border-left-color: #EF4444; }
            .highlight { background: rgba(124, 58, 237, 0.3); color: #A78BFA; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="brand">
            <i class="fas fa-vote-yea"></i>
            Villimale <span>Dhaaira</span>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <i class="fas fa-search icon"></i>
        <input type="text" id="searchInput" placeholder="Search by name, ID, house, or phone..." autofocus />
        <button class="clear" id="clearBtn" onclick="clearSearch()">
            <i class="fas fa-times-circle"></i>
        </button>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="stats">
            <strong id="resultCount">0</strong> voters found
        </div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <span class="hint">Press <kbd>/</kbd> · <kbd>Esc</kbd> clear</span>
            <div class="view-toggle">
                <button class="active" data-view="list" onclick="setView('list')">
                    <i class="fas fa-list"></i>
                </button>
                <button data-view="grid" onclick="setView('grid')">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div id="resultsContainer">
        <div class="loading">
            <i class="fas fa-spinner"></i>
            Loading voters...
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="voterModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalName">Voter</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-photo" id="modalPhoto">
                <div class="no-photo">👤</div>
            </div>
            <div class="modal-info" id="modalInfo">
                <div class="row"><span class="label">National ID</span><span class="value" id="modalId">—</span></div>
                <div class="row"><span class="label">Phone</span><span class="value" id="modalPhone">—</span></div>
                <div class="row"><span class="label">House</span><span class="value" id="modalHouse">—</span></div>
                <div class="row"><span class="label">Age</span><span class="value" id="modalAge">—</span></div>
                <div class="row"><span class="label">Gender</span><span class="value" id="modalGender">—</span></div>
                <div class="row"><span class="label">Party</span><span class="value" id="modalParty">—</span></div>
                <div class="row"><span class="label">Vote Status</span><span class="value" id="modalStatus">—</span></div>
                <div class="row"><span class="label">Reach Status</span><span class="value" id="modalReach">—</span></div>
            </div>
            <div class="modal-actions">
                <button class="btn-copy" onclick="copyModalVoter()">
                    <i class="fas fa-copy"></i> Copy Details
                </button>
                <button class="btn-close-modal" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <!-- ==========================================
    SCRIPTS
    ========================================== -->
    <script>
        // ============================================
        // CONFIG
        // ============================================
        const CONFIG = {
            SUPABASE_URL: 'https://espezmdpkoixnfchomqb.supabase.co',
            SUPABASE_ANON_KEY: 'sb_publishable_xP8z74zcMuCkj6xlu1bJ3w_Kudqbcu1',
            APP: {
                tableName: 'full_import'
            }
        };

        // ============================================
        // STATE
        // ============================================
        let allVoters = [];
        let searchTimeout = null;
        let currentView = 'list';
        let currentModalVoter = null;

        // ============================================
        // SUPABASE
        // ============================================
        let supabaseClient = null;

        function initSupabase() {
            try {
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient(
                        CONFIG.SUPABASE_URL,
                        CONFIG.SUPABASE_ANON_KEY
                    );
                    console.log('✅ Supabase ready');
                    return true;
                }
            } catch (e) {
                console.warn('⚠️ Supabase init failed:', e.message);
            }
            return false;
        }

        // ============================================
        // LOAD DATA
        // ============================================
        async function loadData() {
            try {
                if (!supabaseClient) {
                    initSupabase();
                }

                if (!supabaseClient) {
                    console.log('📊 No Supabase, using sample data');
                    useSampleData();
                    return;
                }

                const table = CONFIG.APP.tableName || 'full_import';
                let data = [];
                let from = 0;
                const size = 1000;

                console.log('📊 Fetching from Supabase...');

                while (true) {
                    const { data: d, error } = await supabaseClient
                        .from(table)
                        .select('*')
                        .order('id', { ascending: true })
                        .range(from, from + size - 1);

                    if (error) {
                        console.warn('⚠️ Supabase error:', error.message);
                        break;
                    }
                    if (!d || d.length === 0) break;

                    data = data.concat(d);
                    console.log(`📄 Loaded ${data.length} voters so far...`);

                    if (d.length < size) break;
                    from += size;
                }

                if (data.length > 0) {
                    allVoters = data;
                    console.log('✅ Loaded ' + allVoters.length + ' voters from Supabase');
                } else {
                    console.log('📊 No data from Supabase, using sample data');
                    useSampleData();
                }

                renderResults(allVoters, '');
                document.getElementById('resultCount').textContent = allVoters.length;

            } catch (e) {
                console.error('❌ Error loading data:', e);
                useSampleData();
            }
        }

        // ============================================
        // SAMPLE DATA
        // ============================================
        function useSampleData() {
            const houses = ['H. Orchid', 'H. Rose', 'H. Tulip', 'H. Lotus', 'H. Lily', 'H. Clover', 'H. Daisy', 'H. Palm', 'H. Sunset', 'H. Coral'];
            const names = ['Ahmed Rasheed', 'Fathimath Shazna', 'Mohamed Aslam', 'Nashid Waheed', 'Hussain Nizar', 'Mariyam Shakeela', 'Aishath Rasha', 'Abdulla Saeed'];
            const photos = [
                'https://ui-avatars.com/api/?name=Ahmed+Rasheed&background=7C3AED&color=fff&size=200',
                'https://ui-avatars.com/api/?name=Fathimath+Shazna&background=7C3AED&color=fff&size=200',
                'https://ui-avatars.com/api/?name=Mohamed+Aslam&background=7C3AED&color=fff&size=200',
                'https://ui-avatars.com/api/?name=Nashid+Waheed&background=7C3AED&color=fff&size=200',
                'https://ui-avatars.com/api/?name=Hussain+Nizar&background=7C3AED&color=fff&size=200',
                'https://ui-avatars.com/api/?name=Mariyam+Shakeela&background=7C3AED&color=fff&size=200',
                'https://ui-avatars.com/api/?name=Aishath+Rasha&background=7C3AED&color=fff&size=200',
                'https://ui-avatars.com/api/?name=Abdulla+Saeed&background=7C3AED&color=fff&size=200'
            ];
            const parties = ['MDP', 'PNC', 'MDP', 'Other', 'MDP', 'PNC', 'MDP', 'Other'];
            const statuses = ['will-vote', 'not-vote', 'pending', 'undecided'];
            const reaches = ['reached', 'not-reached'];

            allVoters = [];

            for (let i = 0; i < 200; i++) {
                const idx = i % names.length;
                allVoters.push({
                    id: i + 1,
                    name: names[idx] + (i > 7 ? ' ' + (i + 1) : ''),
                    national_id: 'A' + String(100000 + i).padStart(6, '0'),
                    house: houses[i % houses.length],
                    phone: '7' + String(700000 + i).padStart(6, '0'),
                    photo_url: photos[idx],
                    age: 18 + (i % 50),
                    sex: i % 2 === 0 ? 'M' : 'F',
                    party: parties[i % parties.length],
                    vote_status: statuses[i % statuses.length],
                    reach_status: reaches[i % reaches.length]
                });
            }

            console.log('📊 Sample data loaded: ' + allVoters.length + ' voters');
            renderResults(allVoters, '');
            document.getElementById('resultCount').textContent = allVoters.length;
        }

        // ============================================
        // VIEW TOGGLE
        // ============================================
        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
            
            const query = document.getElementById('searchInput').value.trim();
            const results = getFilteredResults(query);
            renderResults(results, query);
        }

        // ============================================
        // GET FILTERED RESULTS
        // ============================================
        function getFilteredResults(query) {
            if (!query) return allVoters;

            const lowerQuery = query.toLowerCase();
            const words = lowerQuery.split(/\s+/).filter(w => w.length > 0);

            return allVoters.filter(v => {
                const name = (v.name || '').toLowerCase();
                const id = (v.national_id || '').toLowerCase();
                const house = (v.house || '').toLowerCase();
                const phone = (v.phone || '').toLowerCase();

                return words.some(word =>
                    name.includes(word) ||
                    id.includes(word) ||
                    house.includes(word) ||
                    phone.includes(word)
                );
            });
        }

        // ============================================
        // SEARCH
        // ============================================
        function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const clearBtn = document.getElementById('clearBtn');

            if (query.length > 0) {
                clearBtn.classList.add('show');
            } else {
                clearBtn.classList.remove('show');
            }

            clearTimeout(searchTimeout);

            searchTimeout = setTimeout(() => {
                const results = getFilteredResults(query);
                renderResults(results, query);
                document.getElementById('resultCount').textContent = results.length;
            }, 200);
        }

        // ============================================
        // HIGHLIGHT TEXT
        // ============================================
        function highlightText(text, query) {
            if (!query || !text) return text || '';

            const words = query.split(/\s+/).filter(w => w.length > 0);
            let result = text;

            words.forEach(word => {
                const regex = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                result = result.replace(regex, '<span class="highlight">$1</span>');
            });

            return result;
        }

        // ============================================
        // RENDER RESULTS
        // ============================================
        function renderResults(voters, query) {
            const container = document.getElementById('resultsContainer');
            const countEl = document.getElementById('resultCount');

            countEl.textContent = voters.length;

            if (voters.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <i class="fas fa-users"></i>
                        <h3>No voters found</h3>
                        <p>Try a different search term</p>
                    </div>
                `;
                return;
            }

            if (currentView === 'list') {
                renderListView(container, voters, query);
            } else {
                renderGridView(container, voters, query);
            }
        }

        // ============================================
        // RENDER LIST VIEW
        // ============================================
        function renderListView(container, voters, query) {
            container.innerHTML = `<div class="results-list">`;

            voters.forEach(v => {
                const initial = (v.name || 'U').charAt(0).toUpperCase();
                const hasPhoto = v.photo_url && v.photo_url.length > 0;
                const photoHtml = hasPhoto ?
                    `<img src="${v.photo_url}" alt="${v.name}" onerror="this.parentElement.innerHTML='<span class=\\'no-photo\\'>${initial}</span>'" />` :
                    `<span class="no-photo">${initial}</span>`;

                const name = query ? highlightText(v.name || 'Unknown', query) : (v.name || 'Unknown');
                const id = query ? highlightText(v.national_id || 'N/A', query) : (v.national_id || 'N/A');
                const house = query ? highlightText(v.house || 'N/A', query) : (v.house || 'N/A');
                const phone = query ? highlightText(v.phone || 'N/A', query) : (v.phone || 'N/A');

                container.innerHTML += `
                    <div class="result-item" onclick="openModal(${v.id})">
                        <div class="avatar">${photoHtml}</div>
                        <div class="info">
                            <div class="name">${name}</div>
                            <div class="detail">
                                <span><i class="fas fa-id-card"></i> ${id}</span>
                                <span class="sep">·</span>
                                <span><i class="fas fa-phone"></i> ${phone}</span>
                                <span class="sep">·</span>
                                <span><i class="fas fa-home"></i> ${house}</span>
                                ${v.age ? `<span class="badge">${v.age} yrs</span>` : ''}
                                ${v.party ? `<span class="badge">${v.party}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML += `</div>`;
        }

        // ============================================
        // RENDER GRID VIEW
        // ============================================
        function renderGridView(container, voters, query) {
            container.innerHTML = `<div class="results-grid">`;

            voters.forEach(v => {
                const initial = (v.name || 'U').charAt(0).toUpperCase();
                const hasPhoto = v.photo_url && v.photo_url.length > 0;
                const photoHtml = hasPhoto ?
                    `<img src="${v.photo_url}" alt="${v.name}" onerror="this.parentElement.innerHTML='<span class=\\'no-photo\\'>${initial}</span>'" />` :
                    `<span class="no-photo">${initial}</span>`;

                const name = query ? highlightText(v.name || 'Unknown', query) : (v.name || 'Unknown');
                const id = query ? highlightText(v.national_id || 'N/A', query) : (v.national_id || 'N/A');
                const house = query ? highlightText(v.house || 'N/A', query) : (v.house || 'N/A');

                container.innerHTML += `
                    <div class="result-card" onclick="openModal(${v.id})">
                        <div class="card-photo">${photoHtml}</div>
                        <div class="card-body">
                            <div class="card-name">${name}</div>
                            <div class="card-detail"><i class="fas fa-id-card"></i> ${id}</div>
                            <div class="card-detail"><i class="fas fa-home"></i> ${house}</div>
                            <div class="card-badges">
                                ${v.age ? `<span class="badge">${v.age}y</span>` : ''}
                                ${v.party ? `<span class="badge">${v.party}</span>` : ''}
                                ${v.vote_status ? `<span class="badge">${v.vote_status}</span>` : ''}
                            </div>
                            <div class="card-id">ID ${v.id}</div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML += `</div>`;
        }

        // ============================================
        // MODAL
        // ============================================
        function openModal(id) {
            const voter = allVoters.find(v => v.id === id);
            if (!voter) return;

            currentModalVoter = voter;

            document.getElementById('modalName').textContent = voter.name || 'Voter';

            // Photo
            const photoContainer = document.getElementById('modalPhoto');
            if (voter.photo_url && voter.photo_url.length > 0) {
                photoContainer.innerHTML = `<img src="${voter.photo_url}" alt="${voter.name}" onerror="this.innerHTML='<div class=\\'no-photo\\'>👤</div>'" />`;
            } else {
                const initial = (voter.name || 'U').charAt(0).toUpperCase();
                photoContainer.innerHTML = `<div class="no-photo">${initial}</div>`;
            }

            // Info
            document.getElementById('modalId').textContent = voter.national_id || '—';
            document.getElementById('modalPhone').textContent = voter.phone || '—';
            document.getElementById('modalHouse').textContent = voter.house || '—';
            document.getElementById('modalAge').textContent = voter.age || '—';
            document.getElementById('modalGender').textContent = voter.sex || '—';
            document.getElementById('modalParty').textContent = voter.party || '—';
            document.getElementById('modalStatus').textContent = voter.vote_status || '—';
            document.getElementById('modalReach').textContent = voter.reach_status || '—';

            document.getElementById('voterModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('voterModal').classList.remove('open');
            document.body.style.overflow = '';
            currentModalVoter = null;
        }

        function copyModalVoter() {
            if (!currentModalVoter) return;

            const v = currentModalVoter;
            const info = `Name: ${v.name}\nID: ${v.national_id}\nPhone: ${v.phone}\nHouse: ${v.house}${v.age ? `\nAge: ${v.age}` : ''}${v.sex ? `\nGender: ${v.sex}` : ''}${v.party ? `\nParty: ${v.party}` : ''}${v.vote_status ? `\nVote Status: ${v.vote_status}` : ''}${v.reach_status ? `\nReach Status: ${v.reach_status}` : ''}`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(info).then(() => {
                    showToast('Copied to clipboard', 'success');
                }).catch(() => fallbackCopy(info));
            } else {
                fallbackCopy(info);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('Copied to clipboard', 'success');
            } catch (e) {
                showToast('Could not copy', 'error');
            }
            ta.remove();
        }

        // ============================================
        // CLEAR SEARCH
        // ============================================
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.remove('show');
            renderResults(allVoters, '');
            document.getElementById('resultCount').textContent = allVoters.length;
            document.getElementById('searchInput').focus();
        }

        // ============================================
        // TOAST
        // ============================================
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const existing = container.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
                const active = document.activeElement;
                if (active && active.tagName !== 'INPUT') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            }
            if (e.key === 'Escape') {
                if (document.getElementById('voterModal').classList.contains('open')) {
                    closeModal();
                } else if (document.getElementById('searchInput').value) {
                    clearSearch();
                } else {
                    document.getElementById('searchInput').blur();
                }
            }
        });

        // Close modal on outside click
        document.getElementById('voterModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', performSearch);

            setTimeout(() => input.focus(), 400);
            loadData();
        });
    </script>

</body>

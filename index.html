<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Villimale Dhaaira - Voter Search</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: #F5F3FF;
            color: #1E293B;
            min-height: 100vh;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 720px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #E2E8F0;
        }

        .header .brand {
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1E293B;
        }

        .header .brand i {
            color: #7C3AED;
            font-size: 22px;
        }

        .header .brand span {
            font-size: 13px;
            color: #94A3B8;
            font-weight: 400;
        }

        .search-box {
            width: 100%;
            max-width: 720px;
            position: relative;
            margin-bottom: 12px;
        }

        .search-box input {
            width: 100%;
            height: 56px;
            padding: 0 48px 0 48px;
            border: 2px solid #E2E8F0;
            border-radius: 14px;
            font-size: 16px;
            background: white;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .search-box input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .search-box input::placeholder {
            color: #94A3B8;
        }

        .search-box .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 18px;
        }

        .search-box .clear {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
            font-size: 20px;
            display: none;
            padding: 4px;
        }

        .search-box .clear.show {
            display: block;
        }

        .search-box .clear:hover {
            color: #1E293B;
        }

        .stats {
            width: 100%;
            max-width: 720px;
            font-size: 13px;
            color: #94A3B8;
            padding: 4px 4px 12px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats strong {
            color: #1E293B;
            font-weight: 600;
        }

        .stats .hint {
            font-size: 12px;
        }

        .stats .hint kbd {
            background: #F1F5F9;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #E2E8F0;
            font-size: 11px;
            font-family: inherit;
        }

        .results {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: 0.2s;
            cursor: default;
            animation: fadeIn 0.3s ease;
        }

        .result:hover {
            border-color: #7C3AED;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.08);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #EDE9FE;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            font-weight: 600;
            color: #7C3AED;
            flex-shrink: 0;
            text-transform: uppercase;
            border: 2px solid #E2E8F0;
        }

        .result .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .result .info {
            flex: 1;
            min-width: 0;
        }

        .result .name {
            font-weight: 600;
            font-size: 15px;
            color: #1E293B;
        }

        .result .detail {
            font-size: 13px;
            color: #64748B;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            margin-top: 2px;
        }

        .result .detail i {
            width: 14px;
            color: #7C3AED;
            font-size: 12px;
            margin-right: 2px;
        }

        .result .detail .sep {
            color: #E2E8F0;
        }

        .result .detail .badge {
            background: #F1F5F9;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            color: #64748B;
        }

        .result .copy {
            padding: 6px 16px;
            border: none;
            border-radius: 8px;
            background: #7C3AED;
            color: white;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .result .copy:hover {
            background: #6D28D9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .result .copy:active {
            transform: scale(0.95);
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #94A3B8;
            background: white;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
        }

        .empty i {
            font-size: 48px;
            color: #E2E8F0;
            display: block;
            margin-bottom: 16px;
        }

        .empty h3 {
            font-size: 18px;
            color: #1E293B;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .empty p {
            font-size: 14px;
            color: #94A3B8;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #94A3B8;
        }

        .loading i {
            font-size: 28px;
            animation: spin 1s linear infinite;
            color: #7C3AED;
            display: block;
            margin-bottom: 12px;
        }

        @keyframes spin {
            from { transform: rotate(0); }
            to { transform: rotate(360deg); }
        }

        .highlight {
            background: #EDE9FE;
            color: #6D28D9;
            padding: 0 3px;
            border-radius: 3px;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E1B4B;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 92%;
            text-align: center;
            animation: slideUp 0.3s ease;
            border-left: 4px solid #7C3AED;
        }

        .toast.success { border-left-color: #22C55E; }
        .toast.error { border-left-color: #EF4444; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .header .brand { font-size: 16px; }
            .header .brand span { display: none; }
            .search-box input { height: 48px; font-size: 14px; padding: 0 40px 0 40px; }
            .search-box .icon { font-size: 15px; left: 14px; }
            .search-box .clear { font-size: 17px; right: 14px; }
            .stats { font-size: 12px; flex-direction: column; align-items: flex-start; gap: 4px; }
            .stats .hint { display: none; }
            .result { padding: 12px 14px; flex-wrap: wrap; gap: 10px; }
            .result .avatar { width: 38px; height: 38px; font-size: 14px; }
            .result .name { font-size: 14px; }
            .result .detail { font-size: 12px; gap: 2px 10px; }
            .result .detail .badge { font-size: 10px; padding: 0 8px; }
            .result .copy { width: 100%; text-align: center; padding: 8px; }
            .empty { padding: 40px 16px; }
            .empty i { font-size: 36px; }
            .empty h3 { font-size: 16px; }
        }

        @media (prefers-color-scheme: dark) {
            body { background: #0F0A1A; color: #F1F5F9; }
            .header { border-bottom-color: #2D3A4F; }
            .header .brand { color: #F1F5F9; }
            .header .brand span { color: #64748B; }
            .search-box input { background: #1A1430; color: #F1F5F9; border-color: #2D3A4F; }
            .search-box input:focus { border-color: #7C3AED; }
            .search-box input::placeholder { color: #64748B; }
            .search-box .icon { color: #64748B; }
            .search-box .clear { color: #64748B; }
            .search-box .clear:hover { color: #F1F5F9; }
            .stats { color: #64748B; }
            .stats strong { color: #F1F5F9; }
            .stats .hint kbd { background: #1A1430; border-color: #2D3A4F; color: #94A3B8; }
            .result { background: #1A1430; border-color: #2D3A4F; }
            .result:hover { border-color: #7C3AED; }
            .result .avatar { background: rgba(124, 58, 237, 0.2); border-color: #2D3A4F; color: #A78BFA; }
            .result .name { color: #F1F5F9; }
            .result .detail { color: #94A3B8; }
            .result .detail i { color: #A78BFA; }
            .result .detail .sep { color: #2D3A4F; }
            .result .detail .badge { background: #0F0A1A; color: #94A3B8; }
            .empty { background: #1A1430; border-color: #2D3A4F; color: #64748B; }
            .empty i { color: #2D3A4F; }
            .empty h3 { color: #F1F5F9; }
            .empty p { color: #64748B; }
            .toast { background: #1A1430; color: #F1F5F9; border-left-color: #7C3AED; }
            .toast.success { border-left-color: #22C55E; }
            .toast.error { border-left-color: #EF4444; }
            .highlight { background: rgba(124, 58, 237, 0.3); color: #A78BFA; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="brand">
            <i class="fas fa-vote-yea"></i>
            Villimale <span>Dhaaira</span>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <i class="fas fa-search icon"></i>
        <input type="text" id="searchInput" placeholder="Search by name, ID, or house..." autofocus />
        <button class="clear" id="clearBtn" onclick="clearSearch()">
            <i class="fas fa-times-circle"></i>
        </button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <span><strong id="resultCount">0</strong> voters found</span>
        <span class="hint">Press <kbd>/</kbd> to search · <kbd>Esc</kbd> to clear</span>
    </div>

    <!-- RESULTS -->
    <div class="results" id="resultsContainer">
        <div class="loading">
            <i class="fas fa-spinner"></i>
            Loading voters...
        </div>
    </div>

    <div id="toastContainer"></div>

    <!-- ==========================================
    SCRIPTS
    ========================================== -->
    <script>
        // ============================================
        // CONFIG
        // ============================================
        const CONFIG = {
            SUPABASE_URL: 'https://espezmdpkoixnfchomqb.supabase.co',
            SUPABASE_ANON_KEY: 'sb_publishable_xP8z74zcMuCkj6xlu1bJ3w_Kudqbcu1',
            APP: {
                tableName: 'full_import'
            }
        };

        // ============================================
        // STATE
        // ============================================
        let allVoters = [];
        let searchTimeout = null;

        // ============================================
        // SUPABASE
        // ============================================
        let supabaseClient = null;

        function initSupabase() {
            try {
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient(
                        CONFIG.SUPABASE_URL,
                        CONFIG.SUPABASE_ANON_KEY
                    );
                    console.log('✅ Supabase ready');
                    return true;
                }
            } catch (e) {
                console.warn('⚠️ Supabase init failed:', e.message);
            }
            return false;
        }

        // ============================================
        // LOAD DATA
        // ============================================
        async function loadData() {
            try {
                if (!supabaseClient) {
                    initSupabase();
                }

                if (!supabaseClient) {
                    console.log('📊 No Supabase, using sample data');
                    useSampleData();
                    return;
                }

                const table = CONFIG.APP.tableName || 'full_import';
                let data = [];
                let from = 0;
                const size = 1000;

                console.log('📊 Fetching from Supabase...');

                while (true) {
                    const { data: d, error } = await supabaseClient
                        .from(table)
                        .select('*')
                        .order('id', { ascending: true })
                        .range(from, from + size - 1);

                    if (error) {
                        console.warn('⚠️ Supabase error:', error.message);
                        break;
                    }
                    if (!d || d.length === 0) break;

                    data = data.concat(d);
                    console.log(`📄 Loaded ${data.length} voters so far...`);

                    if (d.length < size) break;
                    from += size;
                }

                if (data.length > 0) {
                    allVoters = data;
                    console.log('✅ Loaded ' + allVoters.length + ' voters from Supabase');
                } else {
                    console.log('📊 No data from Supabase, using sample data');
                    useSampleData();
                }

                renderResults(allVoters, '');
                document.getElementById('resultCount').textContent = allVoters.length;

            } catch (e) {
                console.error('❌ Error loading data:', e);
                useSampleData();
            }
        }

        // ============================================
        // SAMPLE DATA (Fallback)
        // ============================================
        function useSampleData() {
            const houses = ['H. Orchid', 'H. Rose', 'H. Tulip', 'H. Lotus', 'H. Lily', 'H. Clover', 'H. Daisy', 'H. Palm', 'H. Sunset', 'H. Coral'];
            const names = ['Ahmed Rasheed', 'Fathimath Shazna', 'Mohamed Aslam', 'Nashid Waheed', 'Hussain Nizar', 'Mariyam Shakeela', 'Aishath Rasha', 'Abdulla Saeed'];

            allVoters = [];

            for (let i = 0; i < 200; i++) {
                allVoters.push({
                    id: i + 1,
                    name: names[i % names.length] + (i > 7 ? ' ' + (i + 1) : ''),
                    national_id: 'A' + String(100000 + i).padStart(6, '0'),
                    house: houses[i % houses.length],
                    phone: '7' + String(700000 + i).padStart(6, '0')
                });
            }

            console.log('📊 Sample data loaded: ' + allVoters.length + ' voters');
            renderResults(allVoters, '');
            document.getElementById('resultCount').textContent = allVoters.length;
        }

        // ============================================
        // SEARCH
        // ============================================
        function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const clearBtn = document.getElementById('clearBtn');

            if (query.length > 0) {
                clearBtn.classList.add('show');
            } else {
                clearBtn.classList.remove('show');
            }

            clearTimeout(searchTimeout);

            searchTimeout = setTimeout(() => {
                if (!query) {
                    renderResults(allVoters, '');
                    return;
                }

                const lowerQuery = query.toLowerCase();
                const results = allVoters.filter(v => {
                    const name = (v.name || '').toLowerCase();
                    const id = (v.national_id || '').toLowerCase();
                    const house = (v.house || '').toLowerCase();
                    const phone = (v.phone || '').toLowerCase();
                    
                    return name.includes(lowerQuery) || 
                           id.includes(lowerQuery) || 
                           house.includes(lowerQuery) ||
                           phone.includes(lowerQuery);
                });

                renderResults(results, query);
            }, 200);
        }

        // ============================================
        // HIGHLIGHT TEXT
        // ============================================
        function highlightText(text, query) {
            if (!query || !text) return text || '';
            const idx = text.toLowerCase().indexOf(query.toLowerCase());
            if (idx === -1) return text;
            return text.substring(0, idx) + 
                   '<span class="highlight">' + text.substring(idx, idx + query.length) + '</span>' + 
                   text.substring(idx + query.length);
        }

        // ============================================
        // RENDER RESULTS
        // ============================================
        function renderResults(voters, query) {
            const container = document.getElementById('resultsContainer');
            const countEl = document.getElementById('resultCount');

            countEl.textContent = voters.length;

            if (voters.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <i class="fas fa-users"></i>
                        <h3>No voters found</h3>
                        <p>Try a different search term</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = voters.map(v => {
                const initial = (v.name || 'U').charAt(0).toUpperCase();
                const name = query ? highlightText(v.name || 'Unknown', query) : (v.name || 'Unknown');
                const id = query ? highlightText(v.national_id || 'N/A', query) : (v.national_id || 'N/A');
                const house = query ? highlightText(v.house || 'N/A', query) : (v.house || 'N/A');
                const phone = query ? highlightText(v.phone || 'N/A', query) : (v.phone || 'N/A');

                return `
                    <div class="result">
                        <div class="avatar">${initial}</div>
                        <div class="info">
                            <div class="name">${name}</div>
                            <div class="detail">
                                <span><i class="fas fa-id-card"></i> ${id}</span>
                                <span class="sep">·</span>
                                <span><i class="fas fa-phone"></i> ${phone}</span>
                                <span class="sep">·</span>
                                <span><i class="fas fa-home"></i> ${house}</span>
                                <span class="badge">ID ${v.id}</span>
                            </div>
                        </div>
                        <button class="copy" onclick="copyVoter(${v.id})">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // COPY VOTER
        // ============================================
        function copyVoter(id) {
            const v = allVoters.find(x => x.id === id);
            if (!v) return;

            const info = `Name: ${v.name}\nID: ${v.national_id}\nPhone: ${v.phone}\nHouse: ${v.house}`;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(info).then(() => {
                    showToast('Copied to clipboard', 'success');
                }).catch(() => fallbackCopy(info));
            } else {
                fallbackCopy(info);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('Copied to clipboard', 'success');
            } catch (e) {
                showToast('Could not copy', 'error');
            }
            ta.remove();
        }

        // ============================================
        // CLEAR SEARCH
        // ============================================
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.remove('show');
            renderResults(allVoters, '');
            document.getElementById('searchInput').focus();
        }

        // ============================================
        // TOAST
        // ============================================
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const existing = container.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', function(e) {
            // / to focus search
            if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
                const active = document.activeElement;
                if (active && active.tagName !== 'INPUT') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            }
            // Escape to clear
            if (e.key === 'Escape') {
                if (document.getElementById('searchInput').value) {
                    clearSearch();
                } else {
                    document.getElementById('searchInput').blur();
                }
            }
        });

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', performSearch);

            setTimeout(() => input.focus(), 400);
            loadData();
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Villimale Dhaaira - Voter Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: #F5F3FF;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid #E2E8F0;
        }
        .header .brand {
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .brand i {
            color: #7C3AED;
        }
        .header .brand span {
            font-size: 13px;
            color: #94A3B8;
            font-weight: 400;
        }
        .search-box {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 12px;
        }
        .search-box input {
            width: 100%;
            height: 52px;
            padding: 0 44px 0 44px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus {
            border-color: #7C3AED;
        }
        .search-box input::placeholder {
            color: #94A3B8;
        }
        .search-box .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
        }
        .search-box .clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
            font-size: 18px;
            display: none;
        }
        .search-box .clear.show {
            display: block;
        }
        .stats {
            width: 100%;
            max-width: 600px;
            font-size: 13px;
            color: #94A3B8;
            padding-bottom: 12px;
        }
        .stats strong {
            color: #1E293B;
        }
        .results {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .result {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .result:hover {
            border-color: #7C3AED;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.1);
        }
        .result .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #EDE9FE;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #7C3AED;
            flex-shrink: 0;
            border: 2px solid #E2E8F0;
            overflow: hidden;
        }
        .result .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .result .avatar .no-photo {
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .result .info {
            flex: 1;
            min-width: 0;
        }
        .result .name {
            font-weight: 600;
            font-size: 15px;
        }
        .result .detail {
            font-size: 13px;
            color: #64748B;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
        }
        .result .detail i {
            width: 14px;
            color: #7C3AED;
            font-size: 12px;
            margin-right: 2px;
        }
        .result .detail .sep {
            color: #E2E8F0;
        }
        .result .copy {
            padding: 4px 14px;
            border: none;
            border-radius: 8px;
            background: #7C3AED;
            color: white;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .result .copy:hover {
            background: #6D28D9;
        }
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #94A3B8;
            background: white;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
        }
        .empty i {
            font-size: 40px;
            color: #E2E8F0;
            display: block;
            margin-bottom: 12px;
        }
        .empty h3 {
            font-size: 17px;
            color: #1E293B;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #94A3B8;
        }
        .loading i {
            font-size: 24px;
            animation: spin 1s linear infinite;
            color: #7C3AED;
            display: block;
            margin-bottom: 10px;
        }
        @keyframes spin {
            from {
                transform: rotate(0);
            }
            to {
                transform: rotate(360deg);
            }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E1B4B;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            max-width: 92%;
            text-align: center;
            animation: toastIn 0.3s ease;
            border-left: 4px solid #7C3AED;
        }
        .toast.success {
            border-left-color: #22C55E;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .header .brand {
                font-size: 16px;
            }
            .header .brand span {
                display: none;
            }
            .search-box input {
                height: 46px;
                font-size: 14px;
            }
            .result {
                padding: 10px 12px;
                flex-wrap: wrap;
                gap: 10px;
            }
            .result .avatar {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
            .result .name {
                font-size: 14px;
            }
            .result .detail {
                font-size: 12px;
                gap: 2px 8px;
            }
            .result .copy {
                width: 100%;
                text-align: center;
            }
        }
        @media (prefers-color-scheme: dark) {
            body {
                background: #0F0A1A;
                color: #F1F5F9;
            }
            .header {
                border-bottom-color: #2D3A4F;
            }
            .search-box input {
                background: #1A1430;
                color: #F1F5F9;
                border-color: #2D3A4F;
            }
            .search-box input:focus {
                border-color: #7C3AED;
            }
            .search-box input::placeholder {
                color: #64748B;
            }
            .search-box .icon {
                color: #64748B;
            }
            .search-box .clear {
                color: #64748B;
            }
            .stats {
                color: #64748B;
            }
            .stats strong {
                color: #F1F5F9;
            }
            .result {
                background: #1A1430;
                border-color: #2D3A4F;
            }
            .result:hover {
                border-color: #7C3AED;
            }
            .result .avatar {
                background: rgba(124, 58, 237, 0.2);
                border-color: #2D3A4F;
                color: #A78BFA;
            }
            .result .name {
                color: #F1F5F9;
            }
            .result .detail {
                color: #94A3B8;
            }
            .result .detail i {
                color: #A78BFA;
            }
            .result .detail .sep {
                color: #2D3A4F;
            }
            .empty {
                background: #1A1430;
                border-color: #2D3A4F;
                color: #64748B;
            }
            .empty h3 {
                color: #F1F5F9;
            }
            .toast {
                background: #1A1430;
                color: #F1F5F9;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">
            <i class="fas fa-vote-yea"></i>
            Villimale <span>Dhaaira</span>
        </div>
    </header>

    <div class="search-box">
        <i class="fas fa-search icon"></i>
        <input type="text" id="searchInput" placeholder="Search by name, ID, or house..." autofocus />
        <button class="clear" id="clearBtn" onclick="clearSearch()">
            <i class="fas fa-times-circle"></i>
        </button>
    </div>

    <div class="stats">
        <strong id="resultCount">0</strong> voters found
    </div>

    <div class="results" id="resultsContainer">
        <div class="loading"><i class="fas fa-spinner"></i> Loading...</div>
    </div>

    <div id="toastContainer"></div>

    <script src="config.js"></script>
    <script>
        // ============================================================
        // MINIMAL SEARCH
        // ============================================================

        // --- STATE ---
        var voters = [];
        var searchInput = document.getElementById('searchInput');
        var resultsContainer = document.getElementById('resultsContainer');
        var resultCount = document.getElementById('resultCount');
        var clearBtn = document.getElementById('clearBtn');

        // --- SUPABASE ---
        var supabaseClient = null;

        function initSupabase() {
            try {
                if (typeof supabase !== 'undefined' && window.CONFIG) {
                    supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                    return true;
                }
            } catch (e) {}
            return false;
        }

        // --- SAMPLE DATA (fallback) ---
        function getSampleData() {
            var houses = ['H. Orchid', 'H. Rose', 'H. Tulip', 'H. Lotus', 'H. Lily', 'H. Clover', 'H. Daisy'];
            var names = ['Ahmed Rasheed', 'Fathimath Shazna', 'Mohamed Aslam', 'Nashid Waheed', 'Hussain Nizar', 'Mariyam Shakeela'];
            var data = [];
            for (var i = 0; i < 100; i++) {
                data.push({
                    id: i + 1,
                    name: names[i % names.length] + (i > 5 ? ' ' + (i + 1) : ''),
                    national_id: 'A' + String(100000 + i).padStart(6, '0'),
                    house: houses[i % houses.length],
                    phone: '7' + String(700000 + i).padStart(6, '0'),
                    photo_url: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(names[i % names.length]) +
                        '&background=7C3AED&color=fff&size=200',
                    party: ['MDP', 'PNC', 'MDP', 'Other', 'MDP', 'PNC'][i % 6],
                    vote_status: ['will-vote', 'not-vote', 'pending'][i % 3],
                    reach_status: ['reached', 'not-reached'][i % 2]
                });
            }
            return data;
        }

        // --- LOAD ---
        function loadData() {
            try {
                if (!supabaseClient) initSupabase();
                if (!supabaseClient) { voters = getSampleData();
                    render(voters); return; }

                var table = CONFIG.APP.tableName;
                var allData = [];
                var from = 0;
                var size = 1000;

                function fetchPage() {
                    supabaseClient.from(table).select('*').order('id', { ascending: true }).range(from, from + size - 1)
                        .then(function(r) {
                            if (r.error || !r.data || r.data.length === 0) {
                                voters = allData.length > 0 ? allData : getSampleData();
                                render(voters);
                                return;
                            }
                            allData = allData.concat(r.data);
                            if (r.data.length < size) { voters = allData;
                                render(voters); return; }
                            from += size;
                            fetchPage();
                        }).catch(function() { voters = getSampleData();
                            render(voters); });
                }
                fetchPage();
            } catch (e) { voters = getSampleData();
                render(voters); }
        }

        // --- THE SEARCH FUNCTION (only 3 lines) ---
        function search(query) {
            if (!query) return voters;
            var q = query.toLowerCase().trim();
            return voters.filter(function(v) {
                return (v.name || '').toLowerCase().indexOf(q) !== -1 ||
                    (v.national_id || '').toLowerCase().indexOf(q) !== -1 ||
                    (v.house || '').toLowerCase().indexOf(q) !== -1 ||
                    (v.phone || '').toLowerCase().indexOf(q) !== -1;
            });
        }

        // --- RENDER ---
        function render(voterList) {
            resultCount.textContent = voterList.length;
            if (voterList.length === 0) {
                resultsContainer.innerHTML =
                '<div class="empty"><i class="fas fa-users"></i><h3>No voters found</h3></div>';
                return;
            }

            var html = '';
            for (var i = 0; i < voterList.length; i++) {
                var v = voterList[i];
                var initial = (v.name || 'U').charAt(0).toUpperCase();
                var photo = v.photo_url ?
                    '<img src="' + v.photo_url + '" alt="' + v.name + '" onerror="this.parentElement.innerHTML=\'' +
                    initial + '\'" />' :
                    initial;

                html += '<div class="result" onclick="copyVoter(' + v.id + ')">';
                html += '<div class="avatar">' + photo + '</div>';
                html += '<div class="info">';
                html += '<div class="name">' + (v.name || 'Unknown') + '</div>';
                html += '<div class="detail">';
                html += '<span><i class="fas fa-id-card"></i> ' + (v.national_id || 'N/A') + '</span>';
                html += '<span class="sep">·</span>';
                html += '<span><i class="fas fa-phone"></i> ' + (v.phone || 'N/A') + '</span>';
                html += '<span class="sep">·</span>';
                html += '<span><i class="fas fa-home"></i> ' + (v.house || 'N/A') + '</span>';
                if (v.party) html += '<span style="background:#F1F5F9;padding:0 8px;border-radius:12px;font-size:11px;color:#64748B;">' +
                    v.party + '</span>';
                html += '</div></div>';
                html += '<button class="copy" onclick="event.stopPropagation();copyVoter(' + v.id +
                    ')"><i class="fas fa-copy"></i> Copy</button>';
                html += '</div>';
            }
            resultsContainer.innerHTML = html;
        }

        // --- HANDLE SEARCH INPUT ---
        function handleSearch() {
            var query = searchInput.value.trim();
            clearBtn.classList.toggle('show', query.length > 0);
            var results = search(query);
            render(results);
        }

        // --- COPY VOTER ---
        function copyVoter(id) {
            var v = voters.find(function(x) { return x.id === id; });
            if (!v) return;
            var info = 'Name: ' + v.name + '\nID: ' + v.national_id + '\nPhone: ' + v.phone + '\nHouse: ' + v.house;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(info).then(function() {
                    showToast('Copied!');
                }).catch(function() { fallbackCopy(info); });
            } else { fallbackCopy(info); }
        }

        function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy');
                showToast('Copied!'); } catch (e) { showToast('Could not copy', 'error'); }
            ta.remove();
        }

        // --- CLEAR ---
        function clearSearch() {
            searchInput.value = '';
            clearBtn.classList.remove('show');
            render(voters);
            searchInput.focus();
        }

        // --- TOAST ---
        function showToast(msg, type) {
            var container = document.getElementById('toastContainer');
            var existing = container.querySelector('.toast');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.className = 'toast' + (type === 'success' ? ' success' : '');
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
            }, 2000);
        }

        // --- KEYBOARD ---
        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape') {
                if (searchInput.value) clearSearch();
                else searchInput.blur();
            }
        });

        // --- INIT ---
        searchInput.addEventListener('input', handleSearch);
        setTimeout(function() { searchInput.focus(); }, 400);
        loadData();
    </script>

</body>
</html>

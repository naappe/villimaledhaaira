<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>White Saffron Bills</title><style>:root{--a:#d97706;--bg:#181818;--card:#262626;--line:#444;--text:#fff;--muted:#aaa}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}header{padding:16px 22px;background:#222;border-bottom:1px solid var(--line);font-weight:800}.wrap{max-width:1400px;margin:auto;padding:20px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}label{display:block;font-size:12px;font-weight:800;margin-bottom:5px}input,select,button{font:inherit}input,select{width:100%;height:42px;border:1px solid var(--line);border-radius:8px;background:#171717;color:#fff;padding:0 10px}.btn{border:0;border-radius:8px;padding:11px 16px;font-weight:800;cursor:pointer}.primary{background:var(--a);color:#fff}.secondary{background:#444;color:#fff}.danger{background:#7f1d1d;color:#fff}.items{overflow:auto}table{width:100%;min-width:1050px;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:12px}th{color:var(--muted)}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.box{border:1px solid var(--line);border-radius:10px;padding:14px}.box small{color:var(--muted)}.box strong{display:block;margin-top:6px;font-size:20px}.msg{margin-left:10px;color:#6ee7b7;font-weight:700}.saved{margin-top:24px}.saved h2{margin-bottom:10px}@media(max-width:800px){.grid,.summary{grid-template-columns:1fr 1fr}}@media(max-width:520px){.grid,.summary{grid-template-columns:1fr}.wrap{padding:12px}}</style></head><body><header>Cafe' White Saffron · Finance</header><div class="wrap"><div class="card"><h2>Bill Information</h2><div class="grid"><div><label>Vendor</label><input id="vendor" placeholder="Example: STO"></div><div><label>Bill Date</label><input id="date" type="date"></div><div><label>GST Type</label><select id="gstType"><option value="exclusive">Add GST</option><option value="inclusive">GST Included</option><option value="none">Without GST</option></select></div><div><label>GST Rate (%)</label><input id="gstRate" type="number" value="8" min="0" step="0.01"></div><div><label>Status</label><select id="status"><option>Paid</option><option>Pending</option></select></div><div><label>Payment Method</label><select id="payment"><option>Cash</option><option>Bank</option><option>Card</option><option>Credit</option></select></div></div></div><div class="card"><h2>Add Item</h2><div class="grid"><div><label>Description</label><input id="desc" placeholder="Chicken Breast"></div><div><label>Unit</label><select id="unit"><option>CSE</option><option>CTN</option><option>BOX</option><option>PKT</option><option>PCS</option><option>KG</option><option>G</option><option>L</option><option>ML</option></select></div><div><label>Quantity</label><input id="qty" type="number" value="1" min="0" step="0.001"></div><div><label>Pack Format</label><input id="pack" value="500x10 g" placeholder="500x10 g"></div><div><label>Rate</label><input id="rate" type="number" value="1500" min="0" step="0.01"></div></div><div style="margin-top:14px"><button class="btn primary" id="addItem">Add Item</button><button class="btn secondary" id="clearItem">Clear Item</button><span id="itemMsg" class="msg"></span></div></div><div class="card items"><h2>Bill Items</h2><table><thead><tr><th>Item</th><th>Unit</th><th>Qty</th><th>Pack</th><th>Total Size</th><th>Unit Rate</th><th>Pack Rate</th><th>KG/L/PCS Rate</th><th>G/ML Rate</th><th>Total</th><th></th></tr></thead><tbody id="itemsBody"></tbody></table></div><div class="summary"><div class="box"><small>Item Lines</small><strong id="lineCount">0</strong></div><div class="box"><small>Subtotal</small><strong id="subtotal">MVR 0.00</strong></div><div class="box"><small>GST</small><strong id="gstTotal">MVR 0.00</strong></div><div class="box"><small>Grand Total</small><strong id="grandTotal">MVR 0.00</strong></div></div><div style="margin:18px 0"><button class="btn primary" id="saveBill">Save Bill</button><button class="btn secondary" id="newBill">New Bill</button><span id="saveMsg" class="msg"></span></div><div class="card saved"><h2>Saved Bills</h2><div class="items"><table><thead><tr><th>Date</th><th>Vendor</th><th>Lines</th><th>Status</th><th>Payment</th><th>Total</th></tr></thead><tbody id="savedBody"></tbody></table></div></div></div><script>(()=>{'use strict';const $=id=>document.getElementById(id),money=n=>'MVR '+Number(n||0).toFixed(2),trim=n=>Number(n).toFixed(3).replace(/\.?0+$/,'');const key='whiteSaffronMultiBillsV1';let bills=[];try{bills=JSON.parse(localStorage.getItem(key)||'[]')}catch(e){bills=[]}let items=[];function parsePack(raw){const m=String(raw||'').trim().toLowerCase().match(/^(\d+(?:\.\d+)?)\s*[x×*]\s*(\d+(?:\.\d+)?)\s*(kg|g|l|ml|pcs|pc)$/i);if(!m)return null;return{size:+m[1],count:+m[2],measure:m[3].toLowerCase()}}function calcItem(){const desc=$('desc').value.trim(),unit=$('unit').value,qty=+$('qty').value,rate=+$('rate').value,packText=$('pack').value.trim(),p=parsePack(packText);if(!desc||!qty||!rate||!p)return null;const packs=qty*p.count;let totalBase=0,totalMajor=0,sizeLabel='',majorLabel='',minorLabel='';if(p.measure==='g'||p.measure==='kg'){totalBase=packs*p.size*(p.measure==='kg'?1000:1);totalMajor=totalBase/1000;sizeLabel=trim(totalMajor)+' KG ('+trim(totalBase)+' G)';majorLabel='KG';minorLabel='G'}else if(p.measure==='ml'||p.measure==='l'){totalBase=packs*p.size*(p.measure==='l'?1000:1);totalMajor=totalBase/1000;sizeLabel=trim(totalMajor)+' L ('+trim(totalBase)+' ML)';majorLabel='L';minorLabel='ML'}else{totalBase=packs*p.size;totalMajor=totalBase;sizeLabel=trim(totalBase)+' PCS';majorLabel='PCS';minorLabel=''}const packRate=packs?rate/packs:0,majorRate=totalMajor?rate/totalMajor:0,minorRate=minorLabel&&totalBase?rate/totalBase:0;return{id:Date.now()+Math.random(),desc,unit,qty,pack:packText,rate,packs,totalBase,totalMajor,sizeLabel,majorLabel,minorLabel,packRate,majorRate,minorRate,total:qty*rate}}function renderItems(){const body=$('itemsBody');body.innerHTML=items.map((x,i)=>'<tr><td>'+x.desc+'</td><td>'+x.unit+'</td><td>'+trim(x.qty)+'</td><td>'+x.pack+'</td><td>'+x.sizeLabel+'</td><td>'+money(x.rate)+'</td><td>'+money(x.packRate)+'</td><td>'+money(x.majorRate)+' / '+x.majorLabel+'</td><td>'+(x.minorLabel?money(x.minorRate)+' / '+x.minorLabel:'—')+'</td><td>'+money(x.total)+'</td><td><button class="btn danger" data-del="'+i+'">Remove</button></td></tr>').join('')||'<tr><td colspan="11">No items added</td></tr>';body.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{items.splice(+b.dataset.del,1);renderItems()});const subtotal=items.reduce((s,x)=>s+x.total,0),type=$('gstType').value,gp=+$('gstRate').value||0;let net=subtotal,gst=0,total=subtotal;if(type==='exclusive'){gst=subtotal*gp/100;total=subtotal+gst}else if(type==='inclusive'){net=gp?subtotal/(1+gp/100):subtotal;gst=subtotal-net;total=subtotal}$('lineCount').textContent=items.length;$('subtotal').textContent=money(net);$('gstTotal').textContent=money(gst);$('grandTotal').textContent=money(total)}function renderSaved(){const body=$('savedBody');body.innerHTML=bills.slice().reverse().map(b=>'<tr><td>'+b.date+'</td><td>'+b.vendor+'</td><td>'+b.items.length+'</td><td>'+b.status+'</td><td>'+b.payment+'</td><td>'+money(b.total)+'</td></tr>').join('')||'<tr><td colspan="6">No saved bills</td></tr>'}function clearItem(){ $('desc').value='';$('qty').value='1';$('pack').value='500x10 g';$('rate').value='';$('itemMsg').textContent=''}$('addItem').onclick=()=>{const item=calcItem();if(!item){$('itemMsg').textContent='Complete item fields and use pack format like 500x10 g';return}items.push(item);clearItem();renderItems();$('itemMsg').textContent='Item added'};$('clearItem').onclick=clearItem;$('gstType').onchange=renderItems;$('gstRate').oninput=renderItems;$('saveBill').onclick=()=>{const vendor=$('vendor').value.trim(),date=$('date').value;if(!vendor||!date){$('saveMsg').textContent='Enter vendor and date';return}if(!items.length){$('saveMsg').textContent='Add at least one item';return}const subtotal=items.reduce((s,x)=>s+x.total,0),type=$('gstType').value,gp=+$('gstRate').value||0;let net=subtotal,gst=0,total=subtotal;if(type==='exclusive'){gst=subtotal*gp/100;total=subtotal+gst}else if(type==='inclusive'){net=gp?subtotal/(1+gp/100):subtotal;gst=subtotal-net}const bill={id:Date.now(),vendor,date,gstType:type,gstRate:gp,status:$('status').value,payment:$('payment').value,items:items.map(x=>({...x})),net,gst,total};bills.push(bill);try{localStorage.setItem(key,JSON.stringify(bills));$('saveMsg').textContent='Bill saved successfully';items=[];renderItems();renderSaved()}catch(e){$('saveMsg').textContent='Could not save: browser storage is unavailable'}};$('newBill').onclick=()=>{items=[];$('vendor').value='';$('saveMsg').textContent='';renderItems()};$('date').value=new Date().toISOString().slice(0,10);renderItems();renderSaved()})();</script></body></html>

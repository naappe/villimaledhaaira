<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Villimale Voter System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css?v=51" />
    <style>
        :root {
            --party-color: #2563eb;
            --btn-text: #ffffff;
        }

        .login-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .login-actions a {
            flex: 1;
            text-align: center;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 12px;
            padding: 8px;
        }

        .admin-email {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 14px;
            padding: 12px 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="password-overlay">
        <div class="password-box">
            <div class="lock-icon"><i class="fas fa-user-shield"></i></div>
            <h2>Admin <span>Login</span></h2>
            <p>Protected access for the voter dashboard</p>
            <form id="loginForm">
                <div class="admin-email" id="adminEmailLabel">naappe@gmail.com</div>
                <div class="form-group">
                    <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" required autofocus />
                </div>
                <div class="remember-row">
                    <input type="checkbox" id="rememberInput" />
                    <label for="rememberInput">Remember this device</label>
                </div>
                <div class="password-error" id="loginError"></div>
                <button type="submit" class="btn-unlock"><i class="fas fa-right-to-bracket"></i> Login</button>
            </form>
            <div class="login-actions">
                <a href="index.html">Home</a>
                <a href="#" id="forgotPasswordLink">Reset password</a>
            </div>
        </div>
    </div>

    <script>window.TEST_MODE_NO_LOGIN = false;</script>
    <script src="js/config.js?v=51"></script>
    <script src="js/components.js?v=51"></script>
    <script src="js/auth.js?v=51"></script>
    <script>
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const rememberInput = document.getElementById('rememberInput');
        const loginError = document.getElementById('loginError');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const adminEmail = String(window.ADMIN_EMAIL || 'naappe@gmail.com').trim().toLowerCase();

        document.getElementById('adminEmailLabel').textContent = adminEmail;
        rememberInput.checked = localStorage.getItem('villimaleRememberAdminEmail') === adminEmail;

        function showMessage(message) {
            loginError.textContent = message;
            loginError.style.display = 'block';
        }

        form.addEventListener('submit', async e => {
            e.preventDefault();
            loginError.style.display = 'none';

            const client = createSupabaseClient();
            const { error } = await client.auth.signInWithPassword({
                email: adminEmail,
                password: passwordInput.value
            });

            if (error) {
                showMessage(error.message || 'Login failed');
                return;
            }

            const user = await getActiveUser();
            if (!user || String(user.email || '').toLowerCase() !== adminEmail) {
                await client.auth.signOut();
                showMessage('This account is not allowed.');
                return;
            }

            if (rememberInput.checked) {
                localStorage.setItem('villimaleRememberAdminEmail', adminEmail);
            } else {
                localStorage.removeItem('villimaleRememberAdminEmail');
            }

            await redirectByRole();
        });

        forgotPasswordLink.addEventListener('click', async e => {
            e.preventDefault();
            loginError.style.display = 'none';

            const client = createSupabaseClient();
            const { error } = await client.auth.resetPasswordForEmail(adminEmail, {
                redirectTo: window.location.origin + window.location.pathname
            });

            showMessage(error
                ? (error.message || 'Could not send reset email')
                : `Password reset email sent to ${adminEmail}`);
        });

        getActiveRole().then(role => {
            if (role) redirectByRole();
        });
    </script>
</body>
</html>

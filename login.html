<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Villimale Dhaaira</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css?v=58" />
    <style>
        :root { --party-color: #2563eb; --btn-text: #ffffff; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #0f0c29, #1a1a2e, #24243e); }
        .password-overlay { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .password-box { width: min(420px, 100%); background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: 22px; box-shadow: 0 30px 90px rgba(0,0,0,.35); backdrop-filter: blur(18px); padding: 34px 32px; }
        .lock-icon { text-align: center; color: #2f6df6; font-size: 46px; margin-bottom: 14px; }
        h2 { color: #fff; text-align: center; font-size: 28px; margin: 0 0 6px; }
        h2 span { color: #2f6df6; }
        .subtitle { color: rgba(255,255,255,.66); text-align: center; margin: 0 0 24px; }
        .admin-email, .password-field { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); border-radius: 12px; color: #fff; font-weight: 800; margin-bottom: 14px; min-height: 46px; }
        .admin-email { display: grid; place-items: center; padding: 0 14px; }
        .password-field { display: grid; grid-template-columns: 1fr 44px; align-items: center; overflow: hidden; }
        .password-field input { background: transparent; border: 0; color: #fff; font: inherit; font-weight: 700; outline: 0; padding: 0 14px; width: 100%; }
        .password-field input::placeholder { color: rgba(255,255,255,.45); }
        .password-field:focus-within { border-color: #2f6df6; box-shadow: 0 0 0 4px rgba(47,109,246,.18); }
        .toggle-password { height: 100%; border: 0; background: rgba(255,255,255,.08); color: rgba(255,255,255,.75); cursor: pointer; font-size: 15px; }
        .remember-row { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.7); font-weight: 700; margin: 8px 0 16px; }
        .remember-row input { width: 18px; height: 18px; accent-color: #2563eb; }
        .password-message { display: none; border-radius: 12px; padding: 11px 12px; font-size: 13px; font-weight: 800; margin-bottom: 14px; line-height: 1.35; }
        .password-message.error { display: block; background: rgba(239,68,68,.16); color: #fecaca; border: 1px solid rgba(239,68,68,.38); }
        .password-message.success { display: block; background: rgba(34,197,94,.15); color: #bbf7d0; border: 1px solid rgba(34,197,94,.35); }
        .btn-unlock { width: 100%; min-height: 48px; border: 0; border-radius: 12px; background: #2563eb; color: #fff; font-size: 16px; font-weight: 900; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 9px; }
        .btn-unlock:disabled { cursor: not-allowed; opacity: .7; }
        .login-actions { display: flex; gap: 8px; margin-top: 16px; }
        .login-actions a { flex: 1; text-align: center; color: rgba(255,255,255,.68); text-decoration: none; font-size: 12px; font-weight: 800; padding: 8px; }
        .login-actions a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="password-overlay">
        <div class="password-box">
            <div class="lock-icon"><i class="fas fa-user-shield"></i></div>
            <h2>Admin <span>Login</span></h2>
            <p class="subtitle">Protected access for admin dashboard</p>
            <form id="loginForm">
                <div class="admin-email" id="adminEmailLabel">naappe@gmail.com</div>
                <div class="password-field"><input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" required autofocus /><button type="button" class="toggle-password" id="togglePassword" aria-label="Show password"><i class="fas fa-eye"></i></button></div>
                <div class="remember-row"><input type="checkbox" id="rememberInput" /><label for="rememberInput">Remember this device</label></div>
                <div class="password-message" id="loginMessage"></div>
                <button type="submit" class="btn-unlock" id="loginButton"><i class="fas fa-right-to-bracket"></i> <span>Login</span></button>
            </form>
            <div class="login-actions"><a href="index.html">Home</a></div>
        </div>
    </div>

    <script>window.TEST_MODE_NO_LOGIN = false;</script>
    <script src="js/config.js?v=58"></script>
    <script src="js/components.js?v=58"></script>
    <script src="js/auth.js?v=58"></script>
    <script>
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const rememberInput = document.getElementById('rememberInput');
        const loginMessage = document.getElementById('loginMessage');
        const loginButton = document.getElementById('loginButton');
        const adminEmail = String(window.ADMIN_EMAIL || 'naappe@gmail.com').trim().toLowerCase();
        const client = createSupabaseClient();
        document.getElementById('adminEmailLabel').textContent = adminEmail;
        rememberInput.checked = localStorage.getItem('villimaleRememberAdminEmail') === adminEmail;
        function showMessage(message, type = 'error') { loginMessage.className = `password-message ${type}`; loginMessage.textContent = message; }
        function clearMessage() { loginMessage.className = 'password-message'; loginMessage.textContent = ''; }
        function setButton(isLoading, text) { loginButton.disabled = isLoading; loginButton.innerHTML = isLoading ? `<i class="fas fa-spinner fa-spin"></i> <span>${text}</span>` : '<i class="fas fa-right-to-bracket"></i> <span>Login</span>'; }
        document.getElementById('togglePassword').addEventListener('click', () => {
            const hidden = passwordInput.type === 'password';
            passwordInput.type = hidden ? 'text' : 'password';
            document.getElementById('togglePassword').innerHTML = hidden ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
            passwordInput.focus();
        });
        form.addEventListener('submit', async e => {
            e.preventDefault(); clearMessage(); setButton(true, 'Checking...');
            try {
                const { error } = await client.auth.signInWithPassword({ email: adminEmail, password: passwordInput.value });
                if (error) { showMessage('Password is not correct.'); setButton(false); return; }
                const role = await getActiveRole();
                if (!role || role.role !== 'admin') { await client.auth.signOut(); showMessage('This login is admin only.'); setButton(false); return; }
                if (rememberInput.checked) localStorage.setItem('villimaleRememberAdminEmail', adminEmail); else localStorage.removeItem('villimaleRememberAdminEmail');
                showMessage('Login successful. Opening dashboard...', 'success'); setButton(true, 'Opening...');
                setTimeout(() => window.location.replace('all-voters.html'), 250);
            } catch { showMessage('Login check failed. Please check internet and try again.'); setButton(false); }
        });
        getActiveRole().then(role => { if (role && role.role === 'admin') window.location.replace('all-voters.html'); });
    </script>
</body>
</html>
